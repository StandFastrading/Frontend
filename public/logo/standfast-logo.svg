<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none" role="img" aria-label="StandFast Technologies">
  <defs>
    <linearGradient id="sfFadeBar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#C8CCD0" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#C8CCD0" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#D8DCE0" stop-opacity="1"/>
    </linearGradient>
    <linearGradient id="sfSubtitle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#D4D8DC"/>
      <stop offset="1" stop-color="#8E9298"/>
    </linearGradient>
  </defs>

  <g>
    <rect x="160" y="130" width="140" height="14" fill="url(#sfFadeBar)"/>
    <rect x="300" y="130" width="140" height="14" fill="#2BA8E0"/>
    <rect x="292" y="95"  width="16" height="110" fill="#2BA8E0"/>
  </g>

  <text x="300" y="280"
        font-family="'Geist', 'Inter', 'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="900"
        font-size="76"
        letter-spacing="2"
        text-anchor="middle"
        fill="#FFFFFF">STANDFAST</text>

  <text x="300" y="325"
        font-family="'Geist', 'Inter', 'Helvetica Neue', Helvetica, Arial, sans-serif"
        font-weight="500"
        font-size="22"
        letter-spacing="14"
        text-anchor="middle"
        fill="url(#sfSubtitle)">TECHNOLOGIES</text>
</svg>
